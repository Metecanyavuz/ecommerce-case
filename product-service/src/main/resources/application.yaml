server:
  port: ${PORT:8083}
  # gzip compression — REST adil karşılaştırma için.
  # Production REST API'lerde Accept-Encoding: gzip standarttır; bu olmadan
  # REST "en kötü haliyle" test edilir. gRPC zaten binary Protobuf kullanıyor.
  # k6 Accept-Encoding: gzip header göndererek bu path'i aktive eder.
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain
    min-response-size: 1024   # < 1KB payload'ı compress etmek CPU israfı

grpc:
  server:
    port: ${GRPC_PORT:9090}
    reflection:
      enabled: true
    # ~20MB ListProducts yanıtı için limit artırıldı (default: 4MB)
    # 5000 ürün × ~3.9 KB ≈ 19.5 MB → 4MB default RESOURCE_EXHAUSTED hatasına yol açıyordu
    max-inbound-message-size: 20971520   # 20 MB
    max-outbound-message-size: 20971520  # 20 MB
    # max-inbound-concurrent-calls: Netty'nin kabul edeceği eşzamanlı RPC üst sınırı.
    # GrpcConfig.java'daki executor pool (200 thread) ile koordineli çalışır.
    max-inbound-concurrent-calls: 200

spring:
  application:
    name: product-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 10

  jackson:
    serialization:
      write-dates-as-timestamps: false   # LocalDateTime → ISO-8601 string (JSON cache deserialize için gerekli)

  autoconfigure:
    exclude:
      - net.devh.boot.grpc.server.autoconfigure.GrpcServerSecurityAutoConfiguration

  datasource:
    url: jdbc:postgresql://localhost:5433/ecommerce?currentSchema=products
    username: admin
    password: secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: public

# Auth Service ile AYNI secret olmalı
jwt:
  secret: 3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
  expiration-ms: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    # RST_STREAM: İstemci (ghz/k6) test süresi bitince in-flight stream'leri iptal eder.
    # "Stream closed before write could take place" → istemci taraflı iptal, sunucu hatası değil.
    # Benchmark gürültüsünü azaltmak için WARN → ERROR. Gerçek hatalar yine görünür.
    io.grpc.netty.shaded.io.grpc.netty.NettyServerHandler: ERROR
