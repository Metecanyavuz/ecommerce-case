<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<th:block layout:fragment="page-title">Customers</th:block>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h5 class="fw-semibold mb-1" style="color:#1e3a5f">Customers</h5>
            <p class="text-muted mb-0" style="font-size:12px;">Kayıtlı tüm müşteriler</p>
        </div>
        <a th:href="@{/admin/customers/new}" class="btn btn-navy">
            <i class="bi bi-person-plus me-2"></i>New Customer
        </a>
    </div>
    <div class="card"><div class="card-body p-0">
        <table class="table mb-0">
            <thead><tr>
                <th class="ps-4">ID</th><th>Name Surname</th><th>Email</th><th>Phone</th><th>Transactions</th>
            </tr></thead>
            <tbody>
            <tr th:each="c : ${customers}">
                <td class="ps-4 text-muted fw-semibold" th:text="'#'+${c.id}"></td>
                <td class="fw-semibold" th:text="${c.name+' '+c.surname}"></td>
                <td th:text="${c.email}"></td>
                <td th:text="${c.phone?:'-'}"></td>
                <td>
                    <a th:href="@{/admin/customers/{id}(id=${c.id})}" class="btn btn-sm btnoutline- navy me-1">Detay</a>
                    <form th:action="@{/admin/customers/{id}/delete(id=${c.id})}"
                          method="post" class="d-inline"
                          onsubmit="return confirm('Müşteriyi silmek istediğinize emin misiniz?')">
                        <button class="btn btn-sm btn-danger">Sil</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div></div>
</div></body></html>
