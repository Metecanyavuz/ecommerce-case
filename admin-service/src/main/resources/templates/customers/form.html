<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<th:block layout:fragment="page-title">New Customer</th:block>
<div layout:fragment="content">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="fw-semibold mb-0" style="color:#1e3a5f">Add new customer</h5>
    <a th:href="@{/admin/customers}" class="btn btn-sm btn-outline-navy">
      <i class="bi bi-arrow-left me-1"></i>Geri
    </a>
  </div>
  <div class="card"><div class="card-body p-4">
    <form th:action="@{/admin/customers/new}" th:object="${customer}" method="post">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Ad *</label>
          <input type="text" th:field="*{name}" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Soyad *</label>
          <input type="text" th:field="*{surname}" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Email *</label>
          <input type="email" th:field="*{email}" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Telefon</label>
          <input type="text" th:field="*{phone}" class="form-control">
        </div>
        <div class="col-12">
          <label class="form-label">Adres</label>
          <textarea th:field="*{address}" class="form-control" rows="2"></textarea>
        </div>
      </div>
      <hr class="section-divider">
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-navy px-4">Save</button>
        <a th:href="@{/admin/customers}" class="btn btn-light px-4">Cancel</a>
      </div>
    </form>
  </div></div>
</div></body></html>
