<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Giriş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/
bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f5f7; }
        .login-card { border: none; border-radius: 10px; box-shadow: 0 4px 24px
        rgba(30,58,95,0.12); }
        .login-header { background: #1e3a5f; border-radius: 10px 10px 0 0; padding: 28px;
            text-align: center; }
        .form-control { border: 1px solid #dde3ea; border-radius: 6px; padding: 9px 13px;
            font-size: 13px; }
        .form-control:focus { border-color: #1e3a5f; box-shadow: 0 0 0 3px
        rgba(30,58,95,0.1); }
        .btn-login { background: #1e3a5f; border: none; border-radius: 6px; padding:
                10px; font-size: 14px; font-weight: 600; }
        .btn-login:hover { background: #152b47; }
    </style>
</head>
<body>
<div class="container" style="padding-top:80px;">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="login-card card">
                <div class="login-header">
                    <div style="font-size:28px;margin-bottom:8px;">🛒</div>
                    <h5 style="color:#fff;margin:0;font-weight:700;">E-Commerce Admin</h5>
                    <p style="color:#7a93b0;font-size:12px;margin-top:4px;">Yönetim Paneli</p>
                </div>
                <div class="card-body p-4">
                    <div th:if="${param.error}" class="alert alert-danger py-2" style="fontsize:
13px;">
                        Kullanıcı adı veya şifre hatalı.
                    </div>
                    <form th:action="@{/admin/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label" style="font-size:13px;font-weight:
500;">Kullanıcı Adı</label>
                            <input type="text" name="username" class="form-control"
                                   placeholder="admin" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label" style="font-size:13px;font-weight:
500;">Şifre</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-login btn-primary w-100 textwhite">
                            Giriş Yap</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
