<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body><div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Stock Management</h2>
        <a th:href="@{/admin/products}" class="btn btn-outline-secondary">Back to Products</a>
    </div>
    <div class="card mb-4 shadow-sm"><div class="card-body">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h5 class="fw-bold mb-1" th:text="${product.name}"></h5>
                <span class="badge bg-secondary" th:text="${product.category}"></span>
            </div>
            <div class="text-center">
                <div class="fs-1 fw-bold text-primary" th:text="${stock != null ? stock.quantity : 0}">0</div>
                <small class="text-muted">Current Stock</small>
            </div>
        </div>
    </div></div>
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card border-success shadow-sm">
                <div class="card-header bg-success text-white fw-semibold">Increase Stock</div>
                <div class="card-body">
                    <form th:action="@{/admin/stocks/{id}/increase(id=${product.id})}"
                          method="post">
                        <div class="mb-3">
                            <label class="form-label">Quantity</label>
                            <input type="number" name="quantity" min="1" class="form-control"
                                   required>
                        </div>
                        <button class="btn btn-success w-100">Increase</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-danger shadow-sm">
                <div class="card-header bg-danger text-white fw-semibold">Decrease Stock</div>
                <div class="card-body">
                    <form th:action="@{/admin/stocks/{id}/decrease(id=${product.id})}"
                          method="post">
                        <div class="mb-3">
                            <label class="form-label">Quantity</label>
                            <input type="number" name="quantity" min="1" class="form-control"
                                   required>
                        </div>
                        <button class="btn btn-danger w-100">Decrease</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div></body></html>
