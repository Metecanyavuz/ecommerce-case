<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:       #0f2544;
            --navy-mid:   #1e3a5f;
            --navy-light: #2d5a8e;
            --surface:    #f7f9fc;
            --card-bg:    #ffffff;
            --border:     #e2e8f0;
            --text-main:  #0f2544;
            --text-muted: #7a8aaa;
            --danger:     #e53e3e;
            --success:    #16a34a;
            --radius:     14px;
            --shadow:     0 2px 16px 0 rgba(15,37,68,0.08);
        }

        body { background: var(--surface); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-main); }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }
        .page-header-left h5 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: var(--navy);
            margin: 0 0 3px 0;
            letter-spacing: -.3px;
        }
        .page-header-left p { font-size: 13px; color: var(--text-muted); margin: 0; }

        .admin-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table thead tr { background: var(--navy); }
        .admin-table thead th {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 11.5px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255,255,255,.75);
            padding: 14px 18px;
            border: none;
        }
        .admin-table tbody tr { border-bottom: 1px solid var(--border); transition: background .13s; }
        .admin-table tbody tr:last-child { border-bottom: none; }
        .admin-table tbody tr:hover { background: var(--surface); }
        .admin-table td { padding: 14px 18px; font-size: 14px; color: var(--text-main); vertical-align: middle; }

        .id-pill {
            display: inline-block;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 20px;
        }

        /* Avatar + email group */
        .user-email-cell { display: flex; align-items: center; gap: 10px; }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--navy-light), var(--navy));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 12px;
            color: #fff;
            flex-shrink: 0;
            text-transform: uppercase;
        }
        .user-email { font-size: 14px; color: var(--text-main); }

        /* Role badge */
        .role-badge {
            display: inline-block;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: .6px;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .role-admin   { background: #fee2e2; color: #b91c1c; }
        .role-user    { background: #dcfce7; color: #15803d; }
        .role-default { background: #f1f5f9; color: #64748b; }

        .date-cell { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
    </style>
</head>
<body>
<th:block layout:fragment="page-title">Kullanıcılar</th:block>
<div layout:fragment="content">

    <div class="page-header">
        <div class="page-header-left">
            <h5>Kullanıcılar</h5>
            <p>Sisteme kayıtlı tüm kullanıcı hesapları</p>
        </div>
    </div>

    <div class="admin-card">
        <table class="admin-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>E-posta</th>
                <th>Rol</th>
                <th>Kayıt Tarihi</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${users}">
                <td><span class="id-pill" th:text="'#' + ${u.id}"></span></td>
                <td>
                    <div class="user-email-cell">
                        <div class="user-avatar"
                             th:text="${#strings.substring(u.email, 0, 1)}">
                        </div>
                        <span class="user-email" th:text="${u.email}"></span>
                    </div>
                </td>
                <td>
            <span class="role-badge"
                  th:text="${u.role}"
                  th:classappend="${u.role == 'ADMIN'} ? ' role-admin' :
                                  (${u.role == 'USER'}  ? ' role-user'  : ' role-default')">
            </span>
                </td>
                <td class="date-cell"
                    th:text="${#temporals.format(u.createdAt, 'dd.MM.yyyy')}">
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
