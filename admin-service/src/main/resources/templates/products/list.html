<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:       #0f2544;
            --navy-mid:   #1e3a5f;
            --navy-light: #2d5a8e;
            --accent:     #e8a020;
            --accent-soft:#fff3dc;
            --surface:    #f7f9fc;
            --card-bg:    #ffffff;
            --border:     #e2e8f0;
            --text-main:  #0f2544;
            --text-muted: #7a8aaa;
            --danger:     #e53e3e;
            --warning:    #d97706;
            --info:       #0284c7;
            --radius:     14px;
            --shadow:     0 2px 16px 0 rgba(15,37,68,0.08);
        }

        body { background: var(--surface); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-main); }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }
        .page-header-left h5 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: var(--navy);
            margin: 0 0 3px 0;
            letter-spacing: -.3px;
        }
        .page-header-left p { font-size: 13px; color: var(--text-muted); margin: 0; }

        .btn-primary-admin {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--navy);
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 14px;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            text-decoration: none;
            cursor: pointer;
            transition: background .18s, transform .14s;
            letter-spacing: .2px;
        }
        .btn-primary-admin:hover { background: var(--navy-light); color:#fff; transform: translateY(-1px); }
        .btn-primary-admin svg { width:16px; height:16px; stroke:#fff; fill:none; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }

        .admin-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table thead tr { background: var(--navy); }
        .admin-table thead th {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 11.5px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255,255,255,.75);
            padding: 14px 18px;
            border: none;
        }
        .admin-table tbody tr { border-bottom: 1px solid var(--border); transition: background .13s; }
        .admin-table tbody tr:last-child { border-bottom: none; }
        .admin-table tbody tr:hover { background: var(--surface); }
        .admin-table td { padding: 14px 18px; font-size: 14px; color: var(--text-main); vertical-align: middle; }

        .id-pill {
            display: inline-block;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .product-name { font-weight: 500; color: var(--navy); }

        .price-cell {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: var(--navy);
        }
        .price-cell span {
            font-weight: 400;
            font-size: 12px;
            color: var(--text-muted);
            margin-left: 2px;
        }

        .category-badge {
            display: inline-block;
            background: #f1f5f9;
            color: #475569;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: .4px;
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .actions-cell { display: flex; align-items: center; gap: 8px; }

        .btn-edit {
            display: inline-flex; align-items: center; gap: 4px;
            border: 1.5px solid #fbbf24;
            color: var(--warning);
            background: transparent;
            font-size: 12px; font-weight: 600;
            font-family: 'Syne', sans-serif;
            padding: 5px 12px; border-radius: 8px;
            text-decoration: none; transition: all .15s;
        }
        .btn-edit:hover { background: #fbbf24; color: #fff; border-color: #fbbf24; }

        .btn-stock {
            display: inline-flex; align-items: center; gap: 4px;
            border: 1.5px solid #7dd3fc;
            color: var(--info);
            background: transparent;
            font-size: 12px; font-weight: 600;
            font-family: 'Syne', sans-serif;
            padding: 5px 12px; border-radius: 8px;
            text-decoration: none; transition: all .15s;
        }
        .btn-stock:hover { background: var(--info); color: #fff; border-color: var(--info); }

        .btn-delete {
            display: inline-flex; align-items: center; gap: 4px;
            border: 1.5px solid #fca5a5;
            color: var(--danger);
            background: transparent;
            font-size: 12px; font-weight: 600;
            font-family: 'Syne', sans-serif;
            padding: 5px 12px; border-radius: 8px;
            cursor: pointer; transition: all .15s;
        }
        .btn-delete:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
    </style>
</head>
<body>
<th:block layout:fragment="page-title">Ürünler</th:block>
<div layout:fragment="content">

    <div class="page-header">
        <div class="page-header-left">
            <h5>Ürünler</h5>
            <p>Tüm ürün kataloğunu yönetin</p>
        </div>
        <a th:href="@{/admin/products/new}" class="btn-primary-admin">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Yeni Ürün
        </a>
    </div>

    <div class="admin-card">
        <table class="admin-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Ürün Adı</th>
                <th>Fiyat</th>
                <th>Kategori</th>
                <th>İşlemler</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${products}">
                <td><span class="id-pill" th:text="'#' + ${p.id}"></span></td>
                <td><span class="product-name" th:text="${p.name}"></span></td>
                <td>
            <span class="price-cell">
              <span th:text="${p.price}"></span><span>TL</span>
            </span>
                </td>
                <td>
                    <span class="category-badge" th:text="${p.category ?: '—'}"></span>
                </td>
                <td>
                    <div class="actions-cell">
                        <a th:href="@{/admin/products/{id}/edit(id=${p.id})}" class="btn-edit">Düzenle</a>
                        <a th:href="@{/admin/products/{id}/stock(id=${p.id})}" class="btn-stock">Stok</a>
                        <form th:action="@{/admin/products/{id}/delete(id=${p.id})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Ürünü silmek istediğinize emin misiniz?')">
                            <button type="submit" class="btn-delete">Sil</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
