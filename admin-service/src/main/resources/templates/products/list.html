<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body><div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Urunler</h2>
        <a th:href="@{/admin/products/new}" class="btn btn-primary">Yeni Urun</a>
    </div>
    <div class="card shadow-sm"><div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-dark"><tr><th>ID</th><th>Ad</th><th>Fiyat</th><th>Kategori</th><th>Islemler</th></tr></thead>
            <tbody>
            <tr th:each="p : ${products}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.price} + ' TL'"></td>
                <td><span class="badge bg-secondary" th:text="${p.category ?: '-'}"></span></td>
                <td>
                    <a th:href="@{/admin/products/{id}/edit(id=${p.id})}" class="btn
btn-sm btn-outline-warning me-1">Duzenle</a>
                    <a th:href="@{/admin/products/{id}/stock(id=${p.id})}" class="btn
btn-sm btn-outline-info me-1">Stok</a>
                    <form th:action="@{/admin/products/{id}/delete(id=${p.id})}"
                          method="post" class="d-inline"
                          onsubmit="return confirm('Silmek istediginize emin misiniz?')">
                        <button class="btn btn-sm btn-outline-danger">Sil</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div></div>
</div></body></html>
