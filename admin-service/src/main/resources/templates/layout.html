<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>E-Commerce Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/
bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrapicons.
css" rel="stylesheet">
    <style>
        :root {
            --navy: #1e3a5f;
            --navy-dark: #152b47;
            --navy-light: #2a4f7c;
            --gray-bg: #f4f5f7;
            --sidebar-text: #cdd8e8;
            --sidebar-muted: #7a93b0;
            --border: #dde3ea;
        }
        body { background: var(--gray-bg); font-family: 'Segoe UI', Arial, sans-serif; }
        /* SIDEBAR */
        .sidebar {
            width: 230px; min-height: 100vh;
            background: var(--navy);
            position: fixed; top: 0; left: 0; z-index: 100;
            display: flex; flex-direction: column;
            border-right: 1px solid var(--navy-dark);
        }
        .sidebar-brand {
            padding: 18px 20px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 10px;
        }
        .sidebar-brand .brand-icon {
            width: 34px; height: 34px; background: rgba(255,255,255,0.12);
            border-radius: 8px; display: flex; align-items: center;
            justify-content: center; font-size: 16px;
        }
        .sidebar-brand .brand-text { font-size: 14px; font-weight: 700; color: #fff; }
        .sidebar-brand .brand-sub { font-size: 11px; color: var(--sidebar-muted); }
        .sidebar-nav { padding: 14px 10px; flex: 1; }
        .nav-section-label {
            font-size: 10px; font-weight: 600; color: var(--sidebar-muted);
            text-transform: uppercase; letter-spacing: 1.2px;
            padding: 10px 10px 5px;
        }
        .sidebar-nav a {
            display: flex; align-items: center; gap: 9px;
            padding: 9px 12px; border-radius: 6px; margin-bottom: 2px;
            color: var(--sidebar-text); text-decoration: none;
            font-size: 13px; transition: all 0.15s;
        }
        .sidebar-nav a:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .sidebar-nav a.active { background: rgba(255,255,255,0.15); color: #fff; fontweight:
                600; }
        .sidebar-nav a i { font-size: 14px; width: 16px; text-align: center; opacity:
                0.85; }
        .sidebar-footer {
            padding: 12px 14px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        /* MAIN */
        .main-wrapper { margin-left: 230px; min-height: 100vh; }
        .topbar {
            background: #fff;
            border-bottom: 2px solid var(--navy);
            padding: 13px 28px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }
        .topbar .page-title { font-size: 15px; font-weight: 600; color: var(--navy); }
        .topbar .user-info { font-size: 12px; color: #6b7280; }
        .content-area { padding: 26px 28px; }
        /* CARDS */
        .card {
            background: #fff; border: 1px solid var(--border);
            border-radius: 8px; box-shadow: 0 1px 4px rgba(30,58,95,0.06);
        }
        .card-header {
            background: #fff; border-bottom: 1px solid var(--border);
            border-radius: 8px 8px 0 0 !important;
            padding: 14px 20px;
        }
        .card-header h6 { color: var(--navy); }
        /* STAT CARDS */
        .stat-card {
            background: #fff; border: 1px solid var(--border);
            border-radius: 8px; padding: 20px 22px;
            box-shadow: 0 1px 4px rgba(30,58,95,0.06);
            border-left: 4px solid var(--navy);
        }
        .stat-card.green { border-left-color: #16a34a; }
        .stat-card.amber { border-left-color: #d97706; }
        .stat-card .stat-label { font-size: 12px; color: #6b7280; font-weight: 500; texttransform:
                uppercase; letter-spacing: 0.5px; }
        .stat-card .stat-value { font-size: 30px; font-weight: 700; color: var(--navy);
            line-height: 1.1; margin: 4px 0; }
        .stat-card .stat-link { font-size: 12px; color: var(--navy-light); textdecoration:
                none; }
        .stat-card .stat-link:hover { text-decoration: underline; }
        .stat-icon { font-size: 28px; opacity: 0.15; color: var(--navy); }
        /* TABLE */
        .table thead th {
            font-size: 11px; font-weight: 700; color: var(--navy);
            text-transform: uppercase; letter-spacing: 0.6px;
            background: #f8f9fc; border-bottom: 2px solid var(--border) !important;
            padding: 11px 14px;
        }
        .table tbody td { font-size: 13px; color: #374151; vertical-align: middle;
            padding: 11px 14px; }
        .table tbody tr:hover td { background: #f8f9fc; }
        /* BADGE */
        .badge { font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius:
                4px; }
        .badge-navy { background: #e8eef7; color: var(--navy); }
        .badge-success { background: #dcfce7; color: #15803d; }
        .badge-info { background: #dbeafe; color: #1d4ed8; }
        .badge-warning { background: #fef9c3; color: #a16207; }
        .badge-danger { background: #fee2e2; color: #b91c1c; }
        .badge-gray { background: #f3f4f6; color: #4b5563; }
        /* BUTTONS */
        .btn-navy { background: var(--navy); border-color: var(--navy); color: #fff; }
        .btn-navy:hover { background: var(--navy-dark); border-color: var(--navy-dark);
            color: #fff; }
        .btn-outline-navy { border: 1px solid var(--navy); color: var(--navy);
            background: transparent; }
        .btn-outline-navy:hover { background: var(--navy); color: #fff; }
        /* FORMS */
        .form-label { font-size: 13px; font-weight: 500; color: #374151; }
        .form-control, .form-select {
            border: 1px solid var(--border); border-radius: 6px;
            font-size: 13px; padding: 8px 12px; color: #1f2937;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--navy); box-shadow: 0 0 0 3px rgba(30,58,95,0.1);
        }
        .section-divider { border:none; border-top: 1px solid var(--border); margin: 20px
        0; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon">🛒</div>
        <div>
            <div class="brand-text">E-Commerce</div>
            <div class="brand-sub">Admin Panel</div>
        </div>
    </div>
    <div class="sidebar-nav">
        <div class="nav-section-label">General</div>
        <a th:href="@{/admin/dashboard}"><i class="bi bi-grid-1x2"></i> Dashboard</a>
        <div class="nav-section-label">Management</div>
        <a th:href="@{/admin/users}"><i class="bi bi-person-badge"></i> Users</a>
        <a th:href="@{/admin/customers}"><i class="bi bi-people"></i> Customers</a>
        <a th:href="@{/admin/products}"><i class="bi bi-box-seam"></i> Products</a>
        <a th:href="@{/admin/orders}"><i class="bi bi-receipt"></i> Orders</a>
    </div>
    <div class="sidebar-footer">
        <form th:action="@{/admin/logout}" method="post">
            <button style="width:100%;background:rgba(255,255,255,0.08);color:var(--sidebar-text);border:none;border-radius:6px;padding:8px;font-size:
13px;cursor:pointer;">
                <i class="bi bi-box-arrow-left me-2"></i>Çıkış Yap
            </button>
        </form>
    </div>
</div>
<div class="main-wrapper">
    <div class="topbar">
<span class="page-title"><th:block layout:fragment="page-title">Panel</th:block></span>
        <span class="user-info"><i class="bi bi-person-circle me-1"></i>admin@ecommerce.com</span>
    </div>
    <div class="content-area">
        <th:block layout:fragment="content"></th:block>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/
bootstrap.bundle.min.js"></script>
</body>
</html>
