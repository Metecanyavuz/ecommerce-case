<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>E-Commerce Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --navy:         #0f2544;
            --navy-dark:    #09192f;
            --navy-mid:     #1e3a5f;
            --navy-light:   #2d5a8e;
            --accent:       #e8a020;
            --gray-bg:      #f4f6f9;
            --sidebar-text: #b8cde4;
            --sidebar-muted:#6a87a8;
            --border:       #e2e8f0;
            --card-bg:      #ffffff;
            --text-main:    #1a2840;
            --text-muted:   #64748b;
            --radius:       12px;
        }

        /* ── Base ── */
        *, *::before, *::after { box-sizing: border-box; }
        body {
            background: var(--gray-bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            font-size: 14px;
            line-height: 1.6;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 228px;
            min-height: 100vh;
            background: var(--navy);
            position: fixed;
            top: 0; left: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand {
            padding: 20px 18px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 11px;
        }
        .brand-icon {
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
        }
        .brand-text {
            font-family: 'Syne', sans-serif;
            font-size: 14.5px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -.1px;
            line-height: 1.2;
        }
        .brand-sub {
            font-size: 11px;
            color: var(--sidebar-muted);
            font-weight: 400;
            margin-top: 1px;
        }

        .sidebar-nav { padding: 16px 10px; flex: 1; }

        .nav-section-label {
            font-size: 9.5px;
            font-weight: 600;
            color: var(--sidebar-muted);
            text-transform: uppercase;
            letter-spacing: 1.4px;
            padding: 10px 10px 4px;
            font-family: 'Syne', sans-serif;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px 12px;
            border-radius: 8px;
            margin-bottom: 2px;
            color: var(--sidebar-text);
            text-decoration: none;
            font-size: 13px;
            font-weight: 400;
            transition: all 0.15s;
            letter-spacing: .1px;
        }
        .sidebar-nav a:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }
        .sidebar-nav a.active {
            background: rgba(255,255,255,0.14);
            color: #fff;
            font-weight: 600;
        }
        .sidebar-nav a i {
            font-size: 15px;
            width: 17px;
            text-align: center;
            opacity: 0.8;
            flex-shrink: 0;
        }

        .sidebar-footer {
            padding: 12px 12px 16px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-footer button {
            width: 100%;
            background: rgba(255,255,255,0.07);
            color: var(--sidebar-text);
            border: none;
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 13px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background .15s, color .15s;
            letter-spacing: .1px;
        }
        .sidebar-footer button:hover {
            background: rgba(255,255,255,0.13);
            color: #fff;
        }

        /* ── Main wrapper ── */
        .main-wrapper { margin-left: 228px; min-height: 100vh; }

        /* ── Topbar ── */
        .topbar {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 1px 0 var(--border);
        }
        .topbar .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--navy);
            letter-spacing: -.1px;
        }
        .topbar .user-info {
            font-size: 12.5px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 400;
        }
        .topbar .user-info i { font-size: 15px; color: var(--navy-light); }

        /* ── Content area ── */
        .content-area { padding: 26px 28px 40px; }

        /* ── Base card ── */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 1px 6px rgba(15,37,68,0.06);
        }
        .card-header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            border-radius: var(--radius) var(--radius) 0 0 !important;
            padding: 14px 20px;
        }
        .card-header h6 {
            color: var(--navy);
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: -.1px;
        }

        /* ── Stat cards ── */
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 22px;
            box-shadow: 0 1px 6px rgba(15,37,68,0.06);
            border-left: 4px solid var(--navy);
            transition: box-shadow .15s, transform .15s;
        }
        .stat-card:hover {
            box-shadow: 0 4px 16px rgba(15,37,68,0.1);
            transform: translateY(-1px);
        }
        .stat-card.green  { border-left-color: #16a34a; }
        .stat-card.amber  { border-left-color: #d97706; }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .7px;
            margin-bottom: 4px;
            font-family: 'Syne', sans-serif;
        }
        .stat-value {
            font-family: 'Syne', sans-serif;
            font-size: 32px;
            font-weight: 800;
            color: var(--navy);
            line-height: 1.1;
            margin: 4px 0 6px;
            letter-spacing: -1px;
        }
        .stat-link {
            font-size: 12px;
            color: var(--navy-light);
            text-decoration: none;
            font-weight: 500;
        }
        .stat-link:hover { text-decoration: underline; }
        .stat-icon { font-size: 30px; opacity: 0.12; color: var(--navy); }

        /* ── Table ── */
        .table thead th {
            font-family: 'Syne', sans-serif;
            font-size: 10.5px;
            font-weight: 700;
            color: rgba(255,255,255,.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--navy);
            border-bottom: none !important;
            padding: 13px 16px;
        }
        .table tbody td {
            font-size: 13.5px;
            color: var(--text-main);
            vertical-align: middle;
            padding: 13px 16px;
            border-color: var(--border);
            font-weight: 400;
        }
        .table tbody tr:hover td { background: #f8fafc; }
        .table tbody tr:last-child td { border-bottom: none; }

        /* ── Badges ── */
        .badge {
            font-family: 'Syne', sans-serif;
            font-size: 10.5px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: .4px;
            text-transform: uppercase;
        }
        .badge-navy     { background: #e8eef7; color: var(--navy); }
        .badge-success  { background: #dcfce7; color: #15803d; }
        .badge-info     { background: #dbeafe; color: #1d4ed8; }
        .badge-warning  { background: #fef9c3; color: #a16207; }
        .badge-danger   { background: #fee2e2; color: #b91c1c; }
        .badge-gray     { background: #f1f5f9; color: #64748b; }

        /* ── Buttons ── */
        .btn-navy {
            background: var(--navy);
            border-color: var(--navy);
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 12.5px;
            letter-spacing: .2px;
            border-radius: 8px;
            padding: 8px 16px;
            transition: background .15s;
        }
        .btn-navy:hover {
            background: var(--navy-dark);
            border-color: var(--navy-dark);
            color: #fff;
        }
        .btn-outline-navy {
            border: 1.5px solid var(--navy-mid);
            color: var(--navy-mid);
            background: transparent;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 12px;
            border-radius: 8px;
            padding: 5px 13px;
            transition: all .15s;
        }
        .btn-outline-navy:hover {
            background: var(--navy);
            color: #fff;
            border-color: var(--navy);
        }

        /* ── Forms ── */
        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
        }
        .form-control, .form-select {
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13.5px;
            padding: 9px 13px;
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: border-color .15s, box-shadow .15s;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--navy-light);
            box-shadow: 0 0 0 3px rgba(45,90,142,0.12);
        }
        .section-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 20px 0;
        }

        /* ── ID pill (shared) ── */
        .id-pill {
            display: inline-block;
            background: #f1f5f9;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 11px;
            padding: 2px 9px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon">🛒</div>
        <div>
            <div class="brand-text">E-Commerce</div>
            <div class="brand-sub">Admin Panel</div>
        </div>
    </div>
    <div class="sidebar-nav">
        <div class="nav-section-label">Genel</div>
        <a th:href="@{/admin/dashboard}">
            <i class="bi bi-grid-1x2"></i> Dashboard
        </a>
        <div class="nav-section-label">Yönetim</div>
        <a th:href="@{/admin/users}">
            <i class="bi bi-person-badge"></i> Kullanıcılar
        </a>
        <a th:href="@{/admin/customers}">
            <i class="bi bi-people"></i> Müşteriler
        </a>
        <a th:href="@{/admin/products}">
            <i class="bi bi-box-seam"></i> Ürünler
        </a>
        <a th:href="@{/admin/orders}">
            <i class="bi bi-receipt"></i> Siparişler
        </a>
    </div>
    <div class="sidebar-footer">
        <form th:action="@{/admin/logout}" method="post">
            <button type="submit">
                <i class="bi bi-box-arrow-left"></i>Çıkış Yap
            </button>
        </form>
    </div>
</div>

<!-- MAIN -->
<div class="main-wrapper">
    <div class="topbar">
        <span class="page-title">
            <th:block layout:fragment="page-title">Panel</th:block>
        </span>
        <span class="user-info">
            <i class="bi bi-person-circle"></i>admin@ecommerce.com
        </span>
    </div>
    <div class="content-area">
        <th:block layout:fragment="content"></th:block>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
