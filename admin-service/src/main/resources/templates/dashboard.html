<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <style>
        /* ── Dashboard-specific overrides ── */
        .stat-card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            margin-bottom: 24px;
        }
        @media (max-width: 900px) {
            .stat-card-grid { grid-template-columns: 1fr; }
        }

        /* Recent orders table inside dashboard card uses layout table styles */
        .recent-orders-table thead th:first-child,
        .recent-orders-table tbody td:first-child {
            padding-left: 22px;
        }

        .order-id-cell {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 13px;
            color: #0f2544;
        }

        .date-cell {
            font-size: 13px;
            color: #64748b;
            white-space: nowrap;
        }

        .alert-warning {
            background: #fffbeb;
            border: 1px solid #fde68a;
            color: #92400e;
            border-radius: 10px;
            font-size: 13px;
            padding: 12px 16px;
            margin-bottom: 22px;
        }

        /* Tümünü Gör button inside card header */
        .card-header .btn-navy {
            font-size: 12px;
            padding: 6px 14px;
        }
    </style>
</head>
<body>
<th:block layout:fragment="page-title">Dashboard</th:block>
<div layout:fragment="content">

    <!-- Alert -->
    <div th:if="${error}"
         class="alert-warning"
         th:text="${error}">
    </div>

    <!-- Stat Cards -->
    <div class="stat-card-grid">

        <!-- Ürün -->
        <div class="stat-card d-flex justify-content-between align-items-start">
            <div>
                <div class="stat-label">Toplam Ürün</div>
                <div class="stat-value" th:text="${productCount}">0</div>
                <a th:href="@{/admin/products}" class="stat-link">
                    Ürünleri görüntüle →
                </a>
            </div>
            <i class="bi bi-box-seam stat-icon"></i>
        </div>

        <!-- Müşteri -->
        <div class="stat-card green d-flex justify-content-between align-items-start">
            <div>
                <div class="stat-label">Toplam Müşteri</div>
                <div class="stat-value" style="color:#15803d" th:text="${customerCount}">0</div>
                <a th:href="@{/admin/customers}" class="stat-link" style="color:#16a34a">
                    Müşterileri görüntüle →
                </a>
            </div>
            <i class="bi bi-people stat-icon" style="color:#16a34a"></i>
        </div>

        <!-- Sipariş -->
        <div class="stat-card amber d-flex justify-content-between align-items-start">
            <div>
                <div class="stat-label">Toplam Sipariş</div>
                <div class="stat-value" style="color:#b45309" th:text="${orderCount}">0</div>
                <a th:href="@{/admin/orders}" class="stat-link" style="color:#d97706">
                    Siparişleri görüntüle →
                </a>
            </div>
            <i class="bi bi-receipt stat-icon" style="color:#d97706"></i>
        </div>

    </div>

    <!-- Recent Orders -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h6 class="mb-0">Son Siparişler</h6>
            <a th:href="@{/admin/orders}" class="btn btn-navy btn-sm">Tümünü Gör</a>
        </div>
        <div class="card-body p-0">
            <table class="table mb-0 recent-orders-table">
                <thead>
                <tr>
                    <th>Sipariş</th>
                    <th>Müşteri</th>
                    <th>Ürün</th>
                    <th>Adet</th>
                    <th>Durum</th>
                    <th>Tarih</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="o : ${recentOrders}">
                    <td>
                        <span class="order-id-cell" th:text="'#' + ${o.id}"></span>
                    </td>
                    <td th:text="${o.customerId}"></td>
                    <td th:text="${o.productId}"></td>
                    <td th:text="${o.quantity}"></td>
                    <td>
                            <span th:text="${o.status}"
                                  th:class="${o.status == 'CREATED'}   ? 'badge badge-navy'    :
                                            (${o.status == 'PAID'}     ? 'badge badge-success'  :
                                            (${o.status == 'SHIPPED'}  ? 'badge badge-info'     :
                                            (${o.status == 'CANCELLED'}? 'badge badge-danger'   :
                                                                         'badge badge-gray')))">
                            </span>
                    </td>
                    <td class="date-cell"
                        th:text="${o.createdAt != null ? #temporals.format(o.createdAt,'dd.MM.yyyy') : '—'}">
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(recentOrders)}">
                    <td colspan="6"
                        style="text-align:center;padding:40px;color:#94a3b8;font-size:13.5px;">
                        Henüz sipariş bulunmuyor
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
