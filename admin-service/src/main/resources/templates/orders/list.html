<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<th:block layout:fragment="page-title">Siparişler</th:block>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h5 class="fw-semibold mb-1" style="color:#1e3a5f">Siparişler</h5>
            <p class="text-muted mb-0" style="font-size:12px;">Tüm sipariş listesi</p>
        </div>
        <a th:href="@{/admin/orders/new}" class="btn btn-navy">
            <i class="bi bi-plus-lg me-2"></i>Yeni Sipariş
        </a>
    </div>
    <div class="card"><div class="card-body p-0">
        <table class="table mb-0">
            <thead><tr>
                <th class="ps-4">ID</th><th>Müşteri</th><th>Ürün</th>
                <th>Adet</th><th>Durum</th><th>Tarih</th><th>İşlem</th>
            </tr></thead>
            <tbody>
            <tr th:each="o : ${orders}">
                <td class="ps-4"><span class="fw-semibold" th:text="'#'+${o.id}"></span></
                td>
                <td th:text="${o.customerId}"></td>
                <td th:text="${o.productId}"></td>
                <td th:text="${o.quantity}"></td>
                <td>
<span th:text="${o.status}"
      th:class="${o.status=='CREATED'} ? 'badge badge-navy' :
(${o.status=='PAID'} ? 'badge badge-success' :
(${o.status=='SHIPPED'} ? 'badge badge-info' :
(${o.status=='CANCELLED'} ? 'badge badge-danger' : 'badge badgegray')))">
</span>
                </td>
                <td th:text="${o.createdAt!=null?
#temporals.format(o.createdAt,'dd.MM.yyyy'):'-'}"></td>
                <td><a th:href="@{/admin/orders/{id}(id=${o.id})}" class="btn btn-sm btnoutline-
navy">Detay</a></td>
            </tr>
            </tbody>
        </table>
    </div></div>
</div></body></html>
