<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:       #0f2544;
            --navy-mid:   #1e3a5f;
            --navy-light: #2d5a8e;
            --accent:     #e8a020;
            --accent-soft:#fff3dc;
            --surface:    #f7f9fc;
            --card-bg:    #ffffff;
            --border:     #e2e8f0;
            --text-main:  #0f2544;
            --text-muted: #7a8aaa;
            --danger:     #e53e3e;
            --success:    #16a34a;
            --info:       #0284c7;
            --radius:     14px;
            --shadow:     0 2px 16px 0 rgba(15,37,68,0.08);
        }

        body { background: var(--surface); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-main); }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }
        .page-header-left h5 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: var(--navy);
            margin: 0 0 3px 0;
            letter-spacing: -.3px;
        }
        .page-header-left p { font-size: 13px; color: var(--text-muted); margin: 0; }

        .btn-primary-admin {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--navy);
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 14px;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            text-decoration: none;
            cursor: pointer;
            transition: background .18s, transform .14s;
            letter-spacing: .2px;
        }
        .btn-primary-admin:hover { background: var(--navy-light); color:#fff; transform: translateY(-1px); }
        .btn-primary-admin svg { width:16px; height:16px; stroke:#fff; fill:none; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }

        .admin-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table thead tr { background: var(--navy); }
        .admin-table thead th {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 11.5px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255,255,255,.75);
            padding: 14px 18px;
            border: none;
        }
        .admin-table tbody tr { border-bottom: 1px solid var(--border); transition: background .13s; }
        .admin-table tbody tr:last-child { border-bottom: none; }
        .admin-table tbody tr:hover { background: var(--surface); }
        .admin-table td { padding: 14px 18px; font-size: 14px; color: var(--text-main); vertical-align: middle; }

        .order-id {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 13px;
            color: var(--navy);
        }

        /* Status badges */
        .status-badge {
            display: inline-block;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: .5px;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .status-created  { background: #dbeafe; color: #1e40af; }
        .status-paid     { background: #dcfce7; color: #15803d; }
        .status-shipped  { background: #e0f2fe; color: #0369a1; }
        .status-cancelled{ background: #fee2e2; color: #b91c1c; }
        .status-default  { background: #f1f5f9; color: #64748b; }

        .date-cell { font-size: 13px; color: var(--text-muted); white-space: nowrap; }

        .btn-detail {
            display: inline-flex; align-items: center; gap:5px;
            border: 1.5px solid var(--navy-mid);
            color: var(--navy-mid);
            background: transparent;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Syne', sans-serif;
            padding: 5px 13px;
            border-radius: 8px;
            text-decoration: none;
            transition: all .15s;
            letter-spacing: .2px;
        }
        .btn-detail:hover { background: var(--navy); color:#fff; border-color: var(--navy); }
    </style>
</head>
<body>
<th:block layout:fragment="page-title">Siparişler</th:block>
<div layout:fragment="content">

    <div class="page-header">
        <div class="page-header-left">
            <h5>Siparişler</h5>
            <p>Tüm sipariş listesini görüntülüyorsunuz</p>
        </div>
        <a th:href="@{/admin/orders/new}" class="btn-primary-admin">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Yeni Sipariş
        </a>
    </div>

    <div class="admin-card">
        <table class="admin-table">
            <thead>
            <tr>
                <th>Sipariş</th>
                <th>Müşteri</th>
                <th>Ürün</th>
                <th>Adet</th>
                <th>Durum</th>
                <th>Tarih</th>
                <th>İşlem</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="o : ${orders}">
                <td><span class="order-id" th:text="'#' + ${o.id}"></span></td>
                <td th:text="${o.customerId}"></td>
                <td th:text="${o.productId}"></td>
                <td th:text="${o.quantity}"></td>
                <td>
            <span class="status-badge"
                  th:text="${o.status}"
                  th:classappend="${o.status == 'CREATED'}   ? ' status-created'   :
                                  (${o.status == 'PAID'}     ? ' status-paid'       :
                                  (${o.status == 'SHIPPED'}  ? ' status-shipped'    :
                                  (${o.status == 'CANCELLED'}? ' status-cancelled'  : ' status-default')))">
            </span>
                </td>
                <td class="date-cell"
                    th:text="${o.createdAt != null ? #temporals.format(o.createdAt, 'dd.MM.yyyy') : '—'}">
                </td>
                <td>
                    <a th:href="@{/admin/orders/{id}(id=${o.id})}" class="btn-detail">Detay</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
