<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<th:block layout:fragment="page-title">Yeni Sipariş</th:block>
<div layout:fragment="content">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="fw-semibold mb-0" style="color:#1e3a5f">Yeni Sipariş Oluştur</h5>
    <a th:href="@{/admin/orders}" class="btn btn-sm btn-outline-navy">
      <i class="bi bi-arrow-left me-1"></i>Geri
    </a>
  </div>
  <div class="card"><div class="card-body p-4">
    <form th:action="@{/admin/orders/new}" th:object="${order}" method="post">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Müşteri ID *</label>
          <input type="number" th:field="*{customerId}" class="form-control"
                 placeholder="örn. 1" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Ürün ID *</label>
          <input type="number" th:field="*{productId}" class="form-control"
                 placeholder="örn. 1" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Adet *</label>
          <input type="number" th:field="*{quantity}" class="form-control"
                 min="1" placeholder="örn. 5" required>
        </div>
      </div>
      <div class="alert mt-3 mb-0" style="background:#e8eef7;border:1px solid
#c5d3e8;font-size:12px;border-radius:6px;">
        <i class="bi bi-info-circle me-2" style="color:#1e3a5f"></i>
        <span style="color:#1e3a5f">Sipariş oluşturulunca stok otomatik azalır ve
bildirim eventi tetiklenir.</span>
      </div>
      <hr class="section-divider">
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-navy px-4">Sipariş Oluştur</button>
        <a th:href="@{/admin/orders}" class="btn btn-light px-4">İptal</a>
      </div>
    </form>
  </div></div>
</div></body></html>
