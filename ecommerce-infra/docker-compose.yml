services:

  # ── INFRA ─────────────────────────────────────────────

  postgres:
    image: postgres:15
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: ecommerce
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ecommerce-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ecommerce-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped

  # ── SERVICES ────────────────────────────────────────────

  auth-service:
    build: ../auth-service
    container_name: ecommerce-auth
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ecommerce?currentSchema=auth
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: secret
      JWT_SECRET: 3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
      JWT_EXPIRATION_MS: 86400000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  customer-service:
    build: ../customer-service
    container_name: ecommerce-customer
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ecommerce?currentSchema=customers
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: secret
      JWT_SECRET: 3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
      JWT_EXPIRATION_MS: 86400000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  product-service:
    build: ../product-service
    container_name: ecommerce-product
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ecommerce?currentSchema=products
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: secret
      JWT_SECRET: 3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
      JWT_EXPIRATION_MS: 86400000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  stock-service:
    build: ../stock-service
    container_name: ecommerce-stock
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ecommerce?currentSchema=stocks
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: secret
      JWT_SECRET: 3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
      JWT_EXPIRATION_MS: 86400000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  order-service:
    build: ../order-service
    container_name: ecommerce-order
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ecommerce?currentSchema=orders
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: secret
      JWT_SECRET: 3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
      JWT_EXPIRATION_MS: 86400000
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVICES_STOCK_URL: http://stock-service:8084
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      stock-service:
        condition: service_started
    restart: unless-stopped

  notification-service:
    build: ../notification-service
    container_name: ecommerce-notification
    ports:
      - "8086:8086"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_started
    restart: unless-stopped

  admin-service:
    build: ../admin-service
    container_name: ecommerce-admin
    ports:
      - "8090:8090"
    environment:
      SERVICES_AUTH_URL: http://auth-service:8081
      SERVICES_CUSTOMER_URL: http://customer-service:8082
      SERVICES_PRODUCT_URL: http://product-service:8083
      SERVICES_STOCK_URL: http://stock-service:8084
      SERVICES_ORDER_URL: http://order-service:8085
    depends_on:
      - auth-service
      - customer-service
      - product-service
      - stock-service
      - order-service
    restart: unless-stopped

volumes:
  postgres_data:
