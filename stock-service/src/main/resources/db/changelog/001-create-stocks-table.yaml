databaseChangeLog:

  - changeSet:
      id: 001-create-stocks-table
      author: metecan
      changes:
        - createTable:
            schemaName: stocks
            tableName: stocks
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: quantity
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

  - changeSet:
      id: 001-create-stocks-product-id-index
      author: metecan
      changes:
        - createIndex:
            schemaName: stocks
            tableName: stocks
            indexName: idx_stocks_product_id
            columns:
              - column:
                  name: product_id
