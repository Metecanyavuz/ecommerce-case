databaseChangeLog:

  - changeSet:
      id: 001-create-customers-table
      author: mete
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            schemaName: customers
            tableName: customers
      changes:
        - createTable:
            schemaName: customers
            tableName: customers
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: surname
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: phone
                  type: VARCHAR(20)
              - column:
                  name: address
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

  - changeSet:
      id: 001-create-customers-email-index
      author: mete
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            schemaName: customers
            tableName: customers
            indexName: idx_customers_email
      changes:
        - createIndex:
            schemaName: customers
            tableName: customers
            indexName: idx_customers_email
            columns:
              - column:
                  name: email
