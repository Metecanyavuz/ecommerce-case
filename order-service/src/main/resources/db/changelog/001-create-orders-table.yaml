databaseChangeLog:

  - changeSet:
      id: 001-create-orders-table
      author: metecan
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            schemaName: orders
            tableName: orders
      changes:
        - createTable:
            schemaName: orders
            tableName: orders
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: customer_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: CREATED
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

  - changeSet:
      id: 001-create-orders-customer-id-index
      author: metecan
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            schemaName: orders
            tableName: orders
            indexName: idx_orders_customer_id
      changes:
        - createIndex:
            schemaName: orders
            tableName: orders
            indexName: idx_orders_customer_id
            columns:
              - column:
                  name: customer_id
